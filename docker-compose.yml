services:
  postgres:
    image: postgres:16-alpine
    container_name: cg-payroll-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cgpayroll
      POSTGRES_PASSWORD: cgpayroll
      POSTGRES_DB: cgpayroll
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cgpayroll -d cgpayroll']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
